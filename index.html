<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5 Dakikada İngilizce - Flashcard App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card-front: #1e293b; --accent: #2dd4bf; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* Ders Seçme Menüsü */
        .selector-container { margin-bottom: 20px; width: 100%; max-width: 380px; }
        select { width: 100%; padding: 12px; border-radius: 12px; background: #334155; color: white; border: 1px solid var(--accent); font-size: 1rem; outline: none; }

        .card-container { perspective: 1000px; width: 100%; max-width: 380px; height: 300px; cursor: pointer; margin: 20px 0; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 30px; border-radius: 25px; font-size: 1.3rem; font-weight: 700; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .front { background: var(--card-front); }
        .back { background: #334155; transform: rotateY(180deg); color: var(--accent); }

        .controls { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 15px; width: 100%; max-width: 380px; }
        button { padding: 15px; border: none; border-radius: 15px; background: #1e293b; color: white; font-size: 1.2rem; cursor: pointer; border: 1px solid #334155; }
        .btn-speak { background: var(--accent); color: #0f172a; font-weight: 800; border: none; }
        #progress { margin-bottom: 10px; font-weight: 600; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="selector-container">
        <select id="lessonSelect" onchange="loadLesson(this.value)">
            <option value="">Ders Seçiniz...</option>
        </select>
    </div>

    <div id="progress">0 / 0</div>

    <div class="card-container" id="cardBox">
        <div class="card" id="mainCard">
            <div class="face front" id="engDisplay">Önce Ders Seçin</div>
            <div class="face back" id="trDisplay">...</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="change(-1)">⬅️</button>
        <button class="btn-speak" onclick="speak(event)">🔊 DINLE</button>
        <button onclick="change(1)">➡️</button>
    </div>

    <script>
        let cards = [];
        let i = 0;
        let startX = 0;

        // 1. Önce data.json'dan ders listesini çek
        fetch('data.json')
            .then(res => res.json())
            .then(lessons => {
                const select = document.getElementById('lessonSelect');
                lessons.forEach(lesson => {
                    let opt = document.createElement('option');
                    opt.value = lesson.file;
                    opt.innerHTML = lesson.name;
                    select.appendChild(opt);
                });
            });

        // 2. Seçilen dersin dosyasını yükle
        function loadLesson(filePath) {
            if(!filePath) return;
            fetch(filePath)
                .then(res => res.json())
                .then(data => {
                    cards = data;
                    i = 0;
                    show();
                });
        }

        function show() {
            if(!cards.length) return;
            document.getElementById('mainCard').classList.remove('flipped');
            setTimeout(() => {
                document.getElementById('engDisplay').innerText = cards[i].en;
                document.getElementById('trDisplay').innerText = cards[i].tr;
                document.getElementById('progress').innerText = `${i + 1} / ${cards.length}`;
            }, 100);
        }

        function change(n) {
            if(!cards.length) return;
            i = (i + n + cards.length) % cards.length;
            show();
        }

        function speak(e) {
            e.stopPropagation();
            if(!cards.length) return;
            const msg = new SpeechSynthesisUtterance(cards[i].en);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        // Dokunma ve Çevirme
        const box = document.getElementById('cardBox');
        box.onclick = () => document.getElementById('mainCard').classList.toggle('flipped');
        
        box.ontouchstart = e => startX = e.touches[0].clientX;
        box.ontouchend = e => {
            let endX = e.changedTouches[0].clientX;
            if (startX - endX > 60) change(1);
            if (endX - startX > 60) change(-1);
        };
    </script>
</body>
</html>
