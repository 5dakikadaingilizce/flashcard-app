<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>5 Dakikada İngilizce - V.3.1 Flash</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.6); 
            --primary: #38bdf8; 
            --secondary: #2dd4bf; 
            --accent: #fb7185; 
            --text-main: #f8fafc; 
            --logo-grad: linear-gradient(90deg, #ff4d4d, #f97316); 
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            min-height: 100dvh; display: flex; justify-content: center; align-items: center; 
            color: var(--text-main); overflow: hidden; padding: 10px; box-sizing: border-box;
            user-select: none; -webkit-user-select: none;
        }

        /* GİRİŞ SAYFASI */
        #entry-page { display: flex; flex-direction: column; align-items: center; width: 100%; max-height: 95vh; overflow-y: auto; }
        .main-title-white { font-family: 'Poppins'; font-size: 24px; font-weight: 900; background: linear-gradient(180deg, #ffffff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .select-lesson-title { background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 26px; margin-bottom: 20px; font-weight: 900; font-family: 'Poppins'; }
        
        #lesson-list-container { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 500px; padding: 10px; }
        .lesson-card { background: var(--card-bg); backdrop-filter: blur(15px); padding: 20px 10px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.12); text-align: center; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; justify-content: center; min-height: 100px; position: relative; }
        .lesson-card h3 { margin: 0; font-family: 'Poppins'; font-size: 1.1rem; background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* UYGULAMA EKRANI */
        #app-screen { display: none; width: 100%; max-width: 400px; flex-direction: column; }
        .app-box { background: var(--card-bg); backdrop-filter: blur(20px); padding: 25px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); text-align: center; position: relative; }

        /* KART VE SWIPE */
        .card-container { perspective: 1000px; width: 100%; height: 260px; margin: 15px 0; cursor: pointer; position: relative; touch-action: none; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s, left 0.3s; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.15); box-sizing: border-box; }
        .front { background: #1e293b; color: var(--secondary); font-size: 24px; font-weight: 800; }
        .back { background: rgba(30, 41, 59, 1); color: var(--text-main); transform: rotateY(180deg); font-size: 20px; font-weight: 700; border-color: var(--primary); }

        /* BUTONLAR */
        .btn-main { background: var(--primary); color: #0f172a; width: 100%; padding: 15px; border-radius: 18px; font-size: 16px; font-weight: 900; border: none; font-family: 'Poppins'; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
        
        /* SAYAÇLAR */
        .stats { margin-top: 5px; display: flex; justify-content: space-between; background: rgba(15, 23, 42, 0.6); padding: 12px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .stat-label { font-size: 8px; color: #94a3b8; font-weight: 800; margin-bottom: 4px; letter-spacing: 1px; }
        .stat-val { font-weight: 800; font-size: 16px; }

        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 8px 15px; color: white; cursor: pointer; font-size: 11px; font-weight: bold; font-family: 'Poppins'; }
    </style>
</head>
<body>

<div id="entry-page">
    <img src="logo.png" style="width: 70px; margin-bottom: 10px;">
    <div class="main-title-white">5 Dakikada İngilizce</div>
    <div class="select-lesson-title">Select Lesson</div>
    <div id="lesson-list-container"></div>
</div>

<div id="app-screen">
    <div style="display:flex; justify-content:space-between; margin-bottom:12px; width: 100%;">
        <button class="nav-btn" onclick="goHome()">HOME</button>
        <button class="nav-btn" onclick="resetLesson()">RESTART</button>
    </div>

    <div class="app-box">
        <div id="lessonTitle" style="background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; font-size: 20px; font-family: 'Poppins';">#Lesson</div>
        
        <div class="card-container" id="swipeArea">
            <div class="card" id="mainCard">
                <div class="face front" id="trDisplay">Yükleniyor...</div>
                <div class="face back" id="engDisplay">Loading...</div>
            </div>
        </div>

        <button class="btn-main" onclick="speak()">
            <span class="material-symbols-rounded">volume_up</span> LISTEN
        </button>

        <div style="font-size: 10px; color: #64748b; margin-bottom: 12px; font-weight: 600;">
            Sola: Bilmiyorum | Sağa: Biliyorum | Tıkla: Çevir
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">BİLMİYORUM</span>
                <span id="wrongCount" class="stat-val" style="color:var(--accent)">0</span>
            </div>
            <div class="stat-item" style="border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1);">
                <span class="stat-label">KALAN</span>
                <span id="remainCount" class="stat-val" style="color:var(--primary)">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">BİLİYORUM</span>
                <span id="correctCount" class="stat-val" style="color:var(--secondary)">0</span>
            </div>
        </div>
    </div>
</div>

<script>
let cards = [], learned = 0, wrong = 0, startX = 0, currentX = 0, startTime = 0;
let activeLesson = null;

// ANA SAYFA DERS LİSTESİ
fetch('data.json').then(res => res.json()).then(data => {
    const container = document.getElementById('lesson-list-container');
    data.forEach(lesson => {
        const div = document.createElement('div');
        div.className = 'lesson-card';
        div.onclick = () => loadLesson(lesson);
        div.innerHTML = `<h3>${lesson.name}</h3>`;
        container.appendChild(div);
    });
});

// DERS YÜKLEME
function loadLesson(lesson) {
    activeLesson = lesson;
    fetch(lesson.file).then(res => res.json()).then(data => {
        cards = [...data]; // Veriyi kopyala
        learned = 0; wrong = 0;
        document.getElementById('lessonTitle').innerText = lesson.name;
        document.getElementById('entry-page').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        show();
    });
}

// KART GÖSTERME
function show() {
    if(cards.length === 0) { 
        alert("Harika! Bu dersi tamamladın."); 
        goHome(); 
        return; 
    }
    const card = document.getElementById('mainCard');
    card.classList.remove('flipped');
    card.style.transition = "none";
    card.style.left = "0";
    card.style.transform = "rotateY(0deg)";
    
    document.getElementById('trDisplay').innerText = cards[0].tr;
    document.getElementById('engDisplay').innerText = cards[0].en;
    document.getElementById('remainCount').innerText = cards.length;
    document.getElementById('correctCount').innerText = learned;
    document.getElementById('wrongCount').innerText = wrong;
}

// SWIPE VE DOKUNMA MANTIĞI
const area = document.getElementById('swipeArea');
const mainCard = document.getElementById('mainCard');

area.ontouchstart = e => { 
    startX = e.touches[0].clientX; 
    startTime = Date.now();
    mainCard.style.transition = "none"; 
};

area.ontouchmove = e => {
    currentX = e.touches[0].clientX - startX;
    let rotationZ = currentX / 15;
    let rotationY = mainCard.classList.contains('flipped') ? 180 : 0;
    mainCard.style.left = currentX + "px";
    mainCard.style.transform = `rotateY(${rotationY}deg) rotateZ(${rotationZ}deg)`;
};

area.ontouchend = () => {
    mainCard.style.transition = "0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
    let duration = Date.now() - startTime;

    if(currentX > 100) { // Biliyorum (Sağa)
        mainCard.style.left = "1000px";
        setTimeout(() => { learned++; cards.shift(); show(); }, 200);
    } else if(currentX < -100) { // Bilmiyorum (Sola)
        mainCard.style.left = "-1000px";
        setTimeout(() => { wrong++; cards.push(cards.shift()); show(); }, 200);
    } else if (Math.abs(currentX) < 10 && duration < 250) { // Sadece Dokunma
        mainCard.style.left = "0";
        mainCard.classList.toggle('flipped');
        let newRot = mainCard.classList.contains('flipped') ? 180 : 0;
        mainCard.style.transform = `rotateY(${newRot}deg)`;
    } else { // İptal
        mainCard.style.left = "0";
        let resetRot = mainCard.classList.contains('flipped') ? 180 : 0;
        mainCard.style.transform = `rotateY(${resetRot}deg)`;
    }
    currentX = 0;
};

// SESLENDİRME
function speak() {
    if(cards.length === 0) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(cards[0].en);
    u.lang = 'en-US';
    u.rate = 0.85;
    window.speechSynthesis.speak(u);
}

// NAVİGASYON
function goHome() { 
    document.getElementById('app-screen').style.display = 'none'; 
    document.getElementById('entry-page').style.display = 'flex'; 
}

function resetLesson() { 
    if(confirm("Dersi sıfırlamak istiyor musun?")) loadLesson(activeLesson); 
}
</script>
</body>
</html>
