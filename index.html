<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>5 Dakikada İngilizce - Swipe Flashcard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.7); 
            --primary: #38bdf8; 
            --secondary: #2dd4bf; 
            --accent: #fb7185; 
            --text-main: #f8fafc; 
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            min-height: 100dvh; display: flex; justify-content: center; align-items: center; 
            color: var(--text-main); overflow: hidden; padding: 10px; box-sizing: border-box;
            user-select: none; -webkit-user-select: none;
        }

        #entry-page { display: flex; flex-direction: column; align-items: center; width: 100%; max-height: 95vh; overflow-y: auto; }
        .main-title-white { font-family: 'Poppins'; font-size: 22px; font-weight: 900; background: linear-gradient(180deg, #ffffff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        #lesson-list-container { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 500px; padding: 20px 10px; }
        .lesson-card { background: var(--card-bg); padding: 20px 10px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.12); text-align: center; cursor: pointer; transition: 0.3s; }

        #app-screen { display: none; width: 100%; max-width: 400px; flex-direction: column; position: relative; }
        
        /* KART ALANI VE SWIPE */
        .card-container { 
            perspective: 1000px; width: 100%; height: 350px; margin: 10px 0; cursor: pointer; 
            position: relative; touch-action: none;
        }
        .card { 
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), left 0.3s ease-out, opacity 0.3s; 
        }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 30px; border-radius: 35px; box-sizing: border-box; text-align: center; border: 2px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .front { background: #1e293b; color: var(--secondary); font-size: 26px; font-weight: 800; }
        .back { background: var(--card-bg); color: var(--text-main); transform: rotateY(180deg); font-size: 24px; font-weight: 700; }

        /* DURUM GÖSTERGELERİ (KAYDIRIRKEN ÇIKAN) */
        .swipe-status {
            position: absolute; top: 20px; padding: 10px 20px; border-radius: 15px; font-weight: 900; font-size: 20px; opacity: 0; pointer-events: none; z-index: 10;
        }
        #status-know { right: 20px; border: 4px solid var(--secondary); color: var(--secondary); transform: rotate(15deg); }
        #status-dont { left: 20px; border: 4px solid var(--accent); color: var(--accent); transform: rotate(-15deg); }

        .stats { display: flex; justify-content: space-between; background: rgba(15, 23, 42, 0.5); padding: 15px; border-radius: 20px; margin-top: 10px; }
        .stat-item { text-align: center; flex: 1; }
        .stat-val { color: var(--primary); font-weight: 800; font-size: 20px; display: block; }
        .stat-label { font-size: 10px; color: #94a3b8; font-weight: bold; }
        
        .hint { text-align: center; font-size: 12px; color: #64748b; margin-top: 5px; }
    </style>
</head>
<body>

<div id="entry-page">
    <div class="main-title-white">5 Dakikada İngilizce</div>
    <div id="lesson-list-container"></div>
</div>

<div id="app-screen">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <button onclick="goHome()" style="background:none; border:none; color:white; cursor:pointer;"><span class="material-symbols-rounded">arrow_back_ios</span></button>
        <div id="lesson-info" style="font-size:14px; color:var(--primary); font-weight:900;">Ders Adı</div>
        <button onclick="speak()" style="background:none; border:none; color:var(--primary); cursor:pointer;"><span class="material-symbols-rounded">volume_up</span></button>
    </div>

    <div class="card-container" id="swipeArea">
        <div id="status-know" class="swipe-status">BİLİYORUM</div>
        <div id="status-dont" class="swipe-status">BİLMİYORUM</div>
        
        <div class="card" id="mainCard">
            <div class="face front" id="trDisplay">...</div>
            <div class="face back" id="engDisplay">...</div>
        </div>
    </div>

    <div class="hint">Sola: Bilmiyorum | Sağa: Biliyorum<br>Tıkla: Çevir</div>

    <div class="stats">
        <div class="stat-item">
            <span class="stat-label">KALAN</span>
            <span id="remainIdx" class="stat-val">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">BİLİNEN</span>
            <span id="learnedIdx" class="stat-val" style="color:var(--secondary)">0</span>
        </div>
    </div>
</div>

<script>
    let activeCards = [];
    let learnedCount = 0;
    let startX = 0;
    let currentX = 0;
    let isDragging = false;

    // DATA ÇEKME
    fetch('data.json').then(res => res.json()).then(data => {
        const container = document.getElementById('lesson-list-container');
        data.forEach(lesson => {
            const card = document.createElement('div');
            card.className = 'lesson-card';
            card.onclick = () => loadLesson(lesson);
            card.innerHTML = `<h3 style="color:var(--primary); margin:0;">${lesson.name}</h3>`;
            container.appendChild(card);
        });
    });

    function loadLesson(lesson) {
        fetch(lesson.file).then(res => res.json()).then(data => {
            activeCards = data;
            learnedCount = 0;
            document.getElementById('lesson-info').innerText = lesson.name;
            document.getElementById('entry-page').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            show();
        });
    }

    function show() {
        if (activeCards.length === 0) {
            alert("Harika! Hepsini öğrendin.");
            goHome();
            return;
        }
        const card = document.getElementById('mainCard');
        card.style.transition = 'none';
        card.style.left = '0';
        card.style.opacity = '1';
        card.classList.remove('flipped');
        
        document.getElementById('trDisplay').innerText = activeCards[0].tr;
        document.getElementById('engDisplay').innerText = activeCards[0].en;
        document.getElementById('remainIdx').innerText = activeCards.length;
        document.getElementById('learnedIdx').innerText = learnedCount;
    }

    // SWIPE MEKANİZMASI
    const swipeArea = document.getElementById('swipeArea');
    const mainCard = document.getElementById('mainCard');

    swipeArea.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        isDragging = true;
        mainCard.style.transition = 'none';
    });

    swipeArea.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        currentX = e.touches[0].clientX - startX;
        
        // Kartı hareket ettir ve biraz döndür
        mainCard.style.left = currentX + 'px';
        mainCard.style.transform = `rotate(${currentX / 20}deg)`;

        // Durum yazılarını göster
        if (currentX > 50) {
            document.getElementById('status-know').style.opacity = Math.min(currentX / 100, 1);
            document.getElementById('status-dont').style.opacity = 0;
        } else if (currentX < -50) {
            document.getElementById('status-dont').style.opacity = Math.min(Math.abs(currentX) / 100, 1);
            document.getElementById('status-know').style.opacity = 0;
        } else {
            document.getElementById('status-know').style.opacity = 0;
            document.getElementById('status-dont').style.opacity = 0;
        }
    });

    swipeArea.addEventListener('touchend', (e) => {
        isDragging = false;
        document.getElementById('status-know').style.opacity = 0;
        document.getElementById('status-dont').style.opacity = 0;

        if (currentX > 120) { // SAĞA - BİLİYORUM
            mainCard.style.transition = '0.3s';
            mainCard.style.left = '1000px';
            setTimeout(() => answer(true), 200);
        } else if (currentX < -120) { // SOLA - BİLMİYORUM
            mainCard.style.transition = '0.3s';
            mainCard.style.left = '-1000px';
            setTimeout(() => answer(false), 200);
        } else { // GERİ BIRAK
            mainCard.style.transition = '0.3s';
            mainCard.style.left = '0';
            mainCard.style.transform = 'rotate(0deg)';
            // Eğer çok az hareket ettiyse çevir (Flip)
            if (Math.abs(currentX) < 10) mainCard.classList.toggle('flipped');
        }
        currentX = 0;
    });

    function answer(known) {
        const currentCard = activeCards.shift();
        if (known) learnedCount++;
        else activeCards.push(currentCard);
        
        mainCard.style.transform = 'rotate(0deg)';
        show();
    }

    function speak() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(activeCards[0].en);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function goHome() {
        document.getElementById('app-screen').style.display = 'none';
        document.getElementById('entry-page').style.display = 'flex';
    }
</script>

</body>
</html>
