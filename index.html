<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5 Dakikada İngilizce Flash Card - V.5.7</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.6); 
            --primary: #38bdf8; 
            --secondary: #2dd4bf; 
            --accent: #fb7185; 
            --text-main: #f8fafc; 
            --logo-grad: linear-gradient(90deg, #ff4d4d, #f97316); 
            --white-grad: linear-gradient(180deg, #ffffff, #94a3b8);
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            min-height: 100dvh; display: flex; justify-content: center; align-items: center; 
            color: var(--text-main); overflow-x: hidden; padding: 10px; box-sizing: border-box; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation; 
        }

        /* Giriş Sayfası */
        #entry-page { display: flex; flex-direction: column; align-items: center; width: 100%; max-height: 95vh; overflow-y: auto; }
        .main-title-white { font-family: 'Poppins'; font-size: 24px; font-weight: 900; background: var(--white-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .select-lesson-title { background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 26px; margin: 5px 0 20px 0; font-weight: 900; font-family: 'Poppins'; }
        
        #lesson-list-container { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 500px; padding-bottom: 40px; }
        .lesson-card { background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 15px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12); text-align: center; cursor: pointer; display: flex; flex-direction: column; justify-content: center; min-height: 80px; }

        /* Uygulama Ekranı */
        #app-screen { display: none; width: 100%; max-width: 450px; flex-direction: column; }
        
        /* Top Bar Düzenlemesi - Mobilde sığmama sorunu çözümü */
        .top-bar { 
            display: flex; 
            flex-wrap: wrap; /* Sığmazsa alt satıra geçer */
            justify-content: center; 
            margin-bottom: 12px; 
            gap: 6px; 
        }
        .nav-btn { 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 10px; 
            height: 38px; 
            padding: 0 10px; 
            font-size: 10px; 
            font-weight: bold; 
            color: white; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 4px; 
            white-space: nowrap;
        }
        .nav-btn.active { background: var(--accent); border-color: white; }
        .nav-btn .material-symbols-rounded { font-size: 16px; }

        .app-box { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 15px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); text-align: center; position: relative; }
        .lesson-title-grad { background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; font-size: 24px; font-family: 'Poppins'; margin-top: 5px; line-height: 1.2; }
        .lesson-content-desc { color: #94a3b8; font-size: 12px; margin-bottom: 10px; display: block; }

        .card-container { perspective: 1000px; width: 100%; height: 200px; margin: 10px 0; position: relative; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), top 0.4s, opacity 0.4s; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); box-sizing: border-box; }
        .front { background: #1e293b; color: var(--secondary); font-size: 24px; font-weight: 800; }
        .back { background: #1e293b; color: var(--text-main); transform: rotateY(180deg); font-size: 20px; font-weight: 700; border-color: var(--primary); }

        .status-badge { position: absolute; top: -5px; right: -5px; padding: 4px 10px; border-radius: 10px; font-size: 9px; font-weight: 900; z-index: 5; }
        .status-learned { background: var(--secondary); color: #0f172a; }
        .status-unknown { background: var(--accent); color: white; }

        .swipe-note { position: absolute; left: 50%; transform: translateX(-50%); padding: 8px 20px; border-radius: 50px; font-family: 'Poppins'; font-weight: 900; font-size: 14px; opacity: 0; z-index: 10; pointer-events: none; }
        #note-know { top: 30px; background: var(--secondary); color: #0f172a; border: 2px solid white; }
        #note-dont { bottom: 30px; background: var(--accent); color: white; border: 2px solid white; }

        .controls-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .control-btn { flex: 1; background: rgba(51, 65, 85, 0.7); border: 1px solid rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; }

        .btn-main { background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: #0f172a; width: 100%; padding: 14px; border-radius: 15px; font-size: 16px; font-weight: 900; border: none; font-family: 'Poppins'; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .stats { display: flex; justify-content: space-between; background: rgba(15, 23, 42, 0.4); padding: 10px 5px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .stat-label-row { font-size: 7px; color: #94a3b8; font-weight: 800; margin-bottom: 2px; text-transform: uppercase; }
        .stat-val { font-weight: 900; font-size: 13px; color: var(--primary); }
        
        .v-tag { position: absolute; top: 10px; right: 10px; font-size: 9px; color: rgba(255,255,255,0.3); }
        
        /* Logo Kırılma Önleyici */
        .logo-img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="v-tag">V.5.7 PRO</div>

<div id="entry-page">
    <img src="logo.png" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3898/3898082.png'">
    <div class="main-title-white">5 Dakikada İngilizce</div>
    <div class="select-lesson-title">Flash Cards</div>
    <div id="lesson-list-container"></div>
</div>

<div id="app-screen">
    <div class="top-bar">
        <button class="nav-btn" onclick="goHome()"><span class="material-symbols-rounded">home</span> HOME</button>
        <button id="trVoiceToggle" class="nav-btn" onclick="toggleTRVoice()"><span class="material-symbols-rounded">volume_up</span> AUTO TR</button>
        <button id="shuffleToggle" class="nav-btn" onclick="toggleShuffle()"><span class="material-symbols-rounded">shuffle</span> SHUFFLE</button>
        <button class="nav-btn" onclick="resetLesson()"><span class="material-symbols-rounded">restart_alt</span> RESET</button>
    </div>
    <div class="app-box">
        <div id="statusBadge" class="status-badge"></div>
        <div id="lessonTitle" class="lesson-title-grad">#Lesson</div>
        <div id="lessonContent" class="lesson-content-desc"></div>

        <div id="note-know" class="swipe-note">I KNOW ✅</div>
        <div id="note-dont" class="swipe-note">I DON'T KNOW ❌</div>

        <div class="card-container" id="swipeArea">
            <div class="card" id="mainCard" onclick="handleFlip(event)">
                <div class="face front" id="trDisplay">...</div>
                <div class="face back" id="engDisplay">...</div>
            </div>
        </div>

        <div class="controls-row">
            <button class="control-btn" onclick="goBack()"><span class="material-symbols-rounded">arrow_back_ios_new</span> BACK</button>
            <button class="control-btn" onclick="goNext()">NEXT <span class="material-symbols-rounded">arrow_forward_ios</span></button>
        </div>

        <button class="btn-main" onclick="speakEN()">
            <span class="material-symbols-rounded">record_voice_over</span> LISTEN EN
        </button>
        
        <div class="stats">
            <div class="stat-item"><div class="stat-label-row">SIRALAMA</div><span id="orderCount" class="stat-val">0</span></div>
            <div class="stat-item"><div class="stat-label-row">TOPLAM</div><span id="remainCount" class="stat-val">0</span></div>
            <div class="stat-item"><div class="stat-label-row" style="color:var(--secondary)">ÖĞRENDİM</div><span id="correctCount" class="stat-val" style="color:var(--secondary)">0</span></div>
            <div class="stat-item"><div class="stat-label-row" style="color:var(--accent)">BİLMİYORUM</div><span id="wrongCount" class="stat-val" style="color:var(--accent)">0</span></div>
        </div>
    </div>
</div>

<script>
let cards = [], currentIndex = 0;
let activeLesson = null, originalData = [];
let autoTRVoice = localStorage.getItem('auto_tr_voice') === 'true';
let shuffleMode = false;
let audioCtx = null;

// Mobil Ses Motoru Uyandırma (En Önemli Kısım)
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Boş bir utterance ile sesi uyandır
    const u = new SpeechSynthesisUtterance("");
    window.speechSynthesis.speak(u);
}
document.addEventListener('touchstart', initAudio, { once: true, passive: true });

function speak(text, lang) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.9; // Mobilde daha net olması için hafif yavaşlatma
    window.speechSynthesis.speak(u);
}

if(autoTRVoice) document.getElementById('trVoiceToggle').classList.add('active');
function toggleTRVoice() { 
    autoTRVoice = !autoTRVoice; 
    localStorage.setItem('auto_tr_voice', autoTRVoice); 
    document.getElementById('trVoiceToggle').classList.toggle('active', autoTRVoice); 
    if(autoTRVoice) speakTR(); 
}

function speakTR() { if(cards.length && autoTRVoice) speak(cards[currentIndex].tr, 'tr-TR'); }
function speakEN() { if(cards.length) speak(cards[currentIndex].en, 'en-US'); }

function toggleShuffle() {
    shuffleMode = !shuffleMode;
    document.getElementById('shuffleToggle').classList.toggle('active', shuffleMode);
    if (shuffleMode) cards = [...cards].sort(() => Math.random() - 0.5);
    else cards = originalData.map(item => ({...item}));
    currentIndex = 0;
    show();
}

function show() {
    if(!cards.length) return;
    const card = cards[currentIndex];
    const mainCardEl = document.getElementById('mainCard');
    const badge = document.getElementById('statusBadge');
    
    mainCardEl.classList.remove('flipped');
    mainCardEl.style.cssText = "top: 0; opacity: 1; transform: rotateY(0deg);";
    
    document.getElementById('trDisplay').innerText = card.tr;
    document.getElementById('engDisplay').innerText = card.en;
    
    badge.className = "status-badge";
    badge.innerText = "";
    if (card.status === 'learned') {
        badge.innerText = "ÖĞRENİLDİ ✅";
        badge.classList.add("status-learned");
    } else if (card.status === 'unknown') {
        badge.innerText = "BİLİNMİYOR ❌";
        badge.classList.add("status-unknown");
    }

    document.getElementById('orderCount').innerText = (currentIndex + 1);
    document.getElementById('remainCount').innerText = cards.length;
    document.getElementById('correctCount').innerText = cards.filter(c => c.status === 'learned').length;
    document.getElementById('wrongCount').innerText = cards.filter(c => c.status === 'unknown').length;

    if(autoTRVoice) setTimeout(speakTR, 400);
}

// Akıllı Geçiş: Öğrenilenleri Atla
function findNextIdx(current, direction) {
    let next = current;
    for (let i = 0; i < cards.length; i++) {
        next = (next + direction + cards.length) % cards.length;
        if (cards[next].status !== 'learned') return next;
    }
    return (current + direction + cards.length) % cards.length; // Hepsi bittiyse normal devam
}

function handleChoice(type) {
    const isUp = type === 'know';
    cards[currentIndex].status = isUp ? 'learned' : 'unknown';
    
    const mainCardEl = document.getElementById('mainCard');
    mainCardEl.style.top = isUp ? "-1000px" : "1000px";
    mainCardEl.style.opacity = "0";
    
    setTimeout(() => {
        currentIndex = findNextIdx(currentIndex, 1);
        saveProgress();
        show();
    }, 300);
}

function goNext() { currentIndex = (currentIndex + 1) % cards.length; show(); }
function goBack() { currentIndex = (currentIndex - 1 + cards.length) % cards.length; show(); }
function handleFlip(e) { if (!hasMoved) document.getElementById('mainCard').classList.toggle('flipped'); }

// Touch Logic
let startY = 0, currentY = 0, isDragging = false, hasMoved = false;
const area = document.getElementById('swipeArea');
const mainCardEl = document.getElementById('mainCard');

area.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; isDragging = true; hasMoved = false; mainCardEl.style.transition = "none"; }, {passive: true});
area.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    currentY = e.touches[0].clientY - startY;
    if (Math.abs(currentY) > 5) hasMoved = true;
    let rotY = mainCardEl.classList.contains('flipped') ? 180 : 0;
    mainCardEl.style.top = currentY + "px";
    mainCardEl.style.transform = `rotateY(${rotY}deg) rotateX(${-currentY/25}deg)`;
    document.getElementById('note-know').style.opacity = currentY < -50 ? "1" : "0";
    document.getElementById('note-dont').style.opacity = currentY > 50 ? "1" : "0";
}, {passive: true});
area.addEventListener('touchend', () => {
    isDragging = false;
    mainCardEl.style.transition = "0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
    if (hasMoved && currentY < -100) handleChoice('know');
    else if (hasMoved && currentY > 100) handleChoice('dont');
    else { mainCardEl.style.top = "0"; mainCardEl.style.transform = `rotateY(${mainCardEl.classList.contains('flipped') ? 180 : 0}deg)`; }
    document.getElementById('note-know').style.opacity = "0";
    document.getElementById('note-dont').style.opacity = "0";
});

function goHome() { saveProgress(); document.getElementById('app-screen').style.display = 'none'; document.getElementById('entry-page').style.display = 'flex'; }
function saveProgress() { if (activeLesson) localStorage.setItem(`lesson_v57_${activeLesson.name}`, JSON.stringify({cards, currentIndex})); }
function resetLesson() { if(confirm("İlerleme sıfırlansın mı?")) { cards.forEach(c => delete c.status); currentIndex = 0; show(); } }

function loadLesson(lesson) {
    activeLesson = lesson;
    fetch(lesson.file).then(res => res.json()).then(data => {
        originalData = data.map(item => ({...item}));
        const saved = localStorage.getItem(`lesson_v57_${lesson.name}`);
        if (saved) {
            const p = JSON.parse(saved);
            cards = p.cards;
            currentIndex = p.currentIndex;
        } else {
            cards = originalData.map(item => ({...item}));
            currentIndex = 0;
        }
        document.getElementById('lessonTitle').innerText = lesson.name;
        document.getElementById('lessonContent').innerText = lesson.subTitle || "";
        document.getElementById('entry-page').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        show();
    });
}

fetch('data.json').then(res => res.json()).then(data => {
    const container = document.getElementById('lesson-list-container');
    data.forEach(lesson => {
        const div = document.createElement('div');
        div.className = 'lesson-card';
        div.onclick = () => loadLesson(lesson);
        div.innerHTML = `<h3>${lesson.name}</h3><p>${lesson.subTitle || ""}</p>`;
        container.appendChild(div);
    });
});
</script>
</body>
</html>
