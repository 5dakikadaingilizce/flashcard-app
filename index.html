<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5 Dakikada İngilizce Flash Card - V.5.5 </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.6); 
            --primary: #38bdf8; 
            --secondary: #2dd4bf; 
            --accent: #fb7185; 
            --text-main: #f8fafc; 
            --logo-grad: linear-gradient(90deg, #ff4d4d, #f97316); 
            --white-grad: linear-gradient(180deg, #ffffff, #94a3b8);
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            min-height: 100dvh; display: flex; justify-content: center; align-items: center; 
            color: var(--text-main); overflow: hidden; padding: 10px; box-sizing: border-box; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation; 
        }

        #entry-page { display: flex; flex-direction: column; align-items: center; width: 100%; max-height: 95vh; overflow-y: auto; }
        .main-title-white { font-family: 'Poppins'; font-size: 24px; font-weight: 900; background: var(--white-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .select-lesson-title { background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 26px; margin: 5px 0 20px 0; font-weight: 900; font-family: 'Poppins'; }

        #lesson-list-container { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 500px; padding-bottom: 40px; }
        .lesson-card { background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 20px 10px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.12); text-align: center; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100px; }
        .lesson-card h3 { margin: 0 0 4px 0 !important; font-family: 'Poppins' !important; font-size: 1.1rem !important; font-weight: 800 !important; background: var(--logo-grad) !important; -webkit-background-clip: text !important; -webkit-text-fill-color: transparent !important; display: block !important; width: 100% !important; line-height: 1.3 !important; }
        .lesson-card p { margin: 0 !important; font-size: 11px !important; color: #94a3b8 !important; font-weight: 500 !important; display: block !important; width: 100% !important; line-height: 1.4 !important; -webkit-text-fill-color: #94a3b8 !important; }

        #app-screen { display: none; width: 100%; max-width: 400px; flex-direction: column; }
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; height: 40px; padding: 0 12px; font-size: 11px; font-weight: bold; color: white; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .nav-btn.active { background: var(--accent); border-color: white; }

        .app-box { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 20px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); text-align: center; position: relative; }
        .lesson-title-grad { background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; font-size: 28px; font-family: 'Poppins'; margin: 0; display: block; line-height: 1.3; }
        .lesson-content-desc { color: #94a3b8; font-size: 13px; margin-bottom: 15px; display: block; }

        .card-container { perspective: 1000px; width: 100%; height: 210px; margin: 10px 0; position: relative; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), top 0.4s, opacity 0.4s; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.15); box-sizing: border-box; }
        .front { background: #1e293b; color: var(--secondary); font-size: 26px; font-weight: 800; }
        .back { background: #1e293b; color: var(--text-main); transform: rotateY(180deg); font-size: 22px; font-weight: 700; border-color: var(--primary); }

        /* Durum Belirteçleri */
        .status-badge { position: absolute; top: -10px; right: -10px; padding: 5px 12px; border-radius: 12px; font-size: 10px; font-weight: 900; z-index: 5; display: none; }
        .status-learned { background: var(--secondary); color: #0f172a; display: block; }
        .status-unknown { background: var(--accent); color: white; display: block; }

        .swipe-note { position: absolute; left: 50%; transform: translateX(-50%); padding: 8px 25px; border-radius: 50px; font-family: 'Poppins'; font-weight: 900; font-size: 16px; opacity: 0; transition: opacity 0.2s; z-index: 10; pointer-events: none; }
        #note-know { top: 40px; background: var(--secondary); color: #0f172a; border: 2px solid white; }
        #note-dont { bottom: 40px; background: var(--accent); color: white; border: 2px solid white; }

        .controls-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .control-btn { flex: 1; background: rgba(51, 65, 85, 0.7); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; gap: 5px; }

        .btn-main { background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: #0f172a; width: 100%; padding: 16px; border-radius: 18px; font-size: 18px; font-weight: 900; border: none; font-family: 'Poppins'; cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); transform: scale(1); } 70% { box-shadow: 0 0 0 12px rgba(56, 189, 248, 0); transform: scale(1.02); } 100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); transform: scale(1); } }

        .stats { display: flex; justify-content: space-between; background: rgba(15, 23, 42, 0.4); padding: 12px 5px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .stat-label-row { display: flex; align-items: center; gap: 3px; font-size: 7px; color: #94a3b8; font-weight: 800; margin-bottom: 2px; }
        .stat-val { font-weight: 900; font-size: 14px; color: var(--primary); }
        .v-tag { position: absolute; top: 10px; right: 10px; font-size: 10px; color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 10px; }
    </style>
</head>
<body>
<div class="v-tag">V.5.5 PRO</div>

<div id="entry-page">
    <img src="logo.png" style="width: 80px; margin-bottom: 10px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3898/3898082.png'">
    <div class="main-title-white">5 Dakikada İngilizce</div>
    <div class="select-lesson-title">Flash Cards</div>
    <div id="lesson-list-container"></div>
</div>

<div id="app-screen">
    <div class="top-bar">
        <button class="nav-btn" onclick="goHome()"><span class="material-symbols-rounded">home</span> HOME</button>
        <button id="trVoiceToggle" class="nav-btn" onclick="toggleTRVoice()"><span class="material-symbols-rounded">volume_up</span> AUTO TR</button>
        <button id="shuffleToggle" class="nav-btn" onclick="toggleShuffle()"><span class="material-symbols-rounded">shuffle</span> SHUFFLE</button>
        <button class="nav-btn" onclick="resetLesson()"><span class="material-symbols-rounded">restart_alt</span> RESET</button>
    </div>
    <div class="app-box">
        <div id="statusBadge" class="status-badge"></div>
        <div id="lessonTitle" class="lesson-title-grad">#Lesson</div>
        <div id="lessonContent" class="lesson-content-desc"></div>

        <div id="note-know" class="swipe-note">I KNOW ✅</div>
        <div id="note-dont" class="swipe-note">I DON'T KNOW ❌</div>

        <div class="card-container" id="swipeArea">
            <div class="card" id="mainCard" onclick="handleFlip(event)">
                <div class="face front" id="trDisplay">...</div>
                <div class="face back" id="engDisplay">...</div>
            </div>
        </div>

        <div class="controls-row">
            <button class="control-btn" onclick="goBack()"><span class="material-symbols-rounded">arrow_back_ios_new</span> BACK</button>
            <button class="control-btn" onclick="goNext()">NEXT <span class="material-symbols-rounded">arrow_forward_ios</span></button>
        </div>

        <button class="btn-main" onclick="speakEN()">
            <span class="material-symbols-rounded">record_voice_over</span> LISTEN EN
        </button>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label-row">ORDER <span class="material-symbols-rounded" style="font-size:10px">assistant_navigation</span></div>
                <span id="orderCount" class="stat-val">0</span>
            </div>
            <div class="stat-item">
                <div class="stat-label-row">TOTAL <span class="material-symbols-rounded" style="font-size:10px">layers</span></div>
                <span id="remainCount" class="stat-val">0</span>
            </div>
            <div class="stat-item">
                <div class="stat-label-row">LEARNED <span class="material-symbols-rounded" style="color:var(--secondary); font-size:10px">task_alt</span></div>
                <span id="correctCount" class="stat-val" style="color:var(--secondary)">0</span>
            </div>
            <div class="stat-item">
                <div class="stat-label-row">UNKNOWN <span class="material-symbols-rounded" style="color:var(--accent); font-size:10px">cancel</span></div>
                <span id="wrongCount" class="stat-val" style="color:var(--accent)">0</span>
            </div>
        </div>
    </div>
</div>

<script>
let cards = [], currentIndex = 0;
let activeLesson = null, originalData = [];
let autoTRVoice = localStorage.getItem('auto_tr_voice') === 'true';
let shuffleMode = false;
let audioCtx = null, pendingSound = null;

// Audio setup
function _createAudioCtx() { if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} return audioCtx; }
function _playSound(type) {
    if (!_createAudioCtx()) return;
    const g = audioCtx.createGain(), o = audioCtx.createOscillator(), t = audioCtx.currentTime;
    o.connect(g); g.connect(audioCtx.destination);
    if (type === 'up') { o.frequency.setValueAtTime(523, t); o.frequency.exponentialRampToValueAtTime(1047, t + 0.12); g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.18); o.start(t); o.stop(t + 0.18); }
    else { o.frequency.setValueAtTime(400, t); o.frequency.exponentialRampToValueAtTime(200, t + 0.18); g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.22); o.start(t); o.stop(t + 0.22); }
}
function _initVoice() { _createAudioCtx(); if (pendingSound) { _playSound(pendingSound); pendingSound = null; } }
document.addEventListener('touchstart', _initVoice, { passive: true });
document.addEventListener('mousedown', _initVoice, { passive: true });

// Voice functions
if(autoTRVoice) document.getElementById('trVoiceToggle').classList.add('active');
function toggleTRVoice() { autoTRVoice = !autoTRVoice; localStorage.setItem('auto_tr_voice', autoTRVoice); document.getElementById('trVoiceToggle').classList.toggle('active', autoTRVoice); if(autoTRVoice) speakTR(); }
function speakTR() { if(!cards.length || !autoTRVoice) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(cards[currentIndex].tr); u.lang = 'tr-TR'; window.speechSynthesis.speak(u); }
function speakEN() { if(!cards.length) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(cards[currentIndex].en); u.lang = 'en-US'; window.speechSynthesis.speak(u); }

// Shuffle
function toggleShuffle() {
    shuffleMode = !shuffleMode;
    document.getElementById('shuffleToggle').classList.toggle('active', shuffleMode);
    if (shuffleMode) cards = [...cards].sort(() => Math.random() - 0.5);
    else cards = [...originalData];
    currentIndex = 0;
    show();
}

// UI Show
function show() {
    if(!cards.length) return;
    const card = cards[currentIndex];
    const mainCardEl = document.getElementById('mainCard');
    const badge = document.getElementById('statusBadge');
    
    mainCardEl.classList.remove('flipped');
    mainCardEl.style.cssText = "top: 0; opacity: 1; transform: rotateY(0deg);";
    
    document.getElementById('trDisplay').innerText = card.tr;
    document.getElementById('engDisplay').innerText = card.en;
    
    // Badge status
    if (card.status === 'learned') {
        badge.innerText = "LEARNED ✅";
        badge.className = "status-badge status-learned";
    } else if (card.status === 'unknown') {
        badge.innerText = "UNKNOWN ❌";
        badge.className = "status-badge status-unknown";
    } else {
        badge.className = "status-badge";
    }

    // Stats
    document.getElementById('orderCount').innerText = (currentIndex + 1);
    document.getElementById('remainCount').innerText = cards.length;
    document.getElementById('correctCount').innerText = cards.filter(c => c.status === 'learned').length;
    document.getElementById('wrongCount').innerText = cards.filter(c => c.status === 'unknown').length;

    if(autoTRVoice) setTimeout(speakTR, 300);
}

// Swipe & Navigation
function handleChoice(type) {
    const isUp = type === 'know';
    _playSound(isUp ? 'up' : 'down');
    
    // Kartın durumunu güncelle (Silme yok, sadece işaretle)
    cards[currentIndex].status = isUp ? 'learned' : 'unknown';
    
    const mainCardEl = document.getElementById('mainCard');
    mainCardEl.style.top = isUp ? "-1000px" : "1000px";
    mainCardEl.style.opacity = "0";
    
    setTimeout(() => {
        currentIndex = (currentIndex + 1) % cards.length;
        saveProgress();
        show();
    }, 300);
}

function goNext() { currentIndex = (currentIndex + 1) % cards.length; show(); }
function goBack() { currentIndex = (currentIndex - 1 + cards.length) % cards.length; show(); }

function handleFlip(e) { if (hasMoved) return; document.getElementById('mainCard').classList.toggle('flipped'); }

// Touch Logic
let startY = 0, currentY = 0, isDragging = false, hasMoved = false;
const area = document.getElementById('swipeArea');
const mainCard = document.getElementById('mainCard');

area.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; isDragging = true; hasMoved = false; mainCard.style.transition = "none"; }, {passive: true});
area.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    currentY = e.touches[0].clientY - startY;
    if (Math.abs(currentY) > 10) hasMoved = true;
    let rotY = mainCard.classList.contains('flipped') ? 180 : 0;
    mainCard.style.top = currentY + "px";
    mainCard.style.transform = `rotateY(${rotY}deg) rotateX(${-currentY/20}deg)`;
    document.getElementById('note-know').style.opacity = currentY < -50 ? "1" : "0";
    document.getElementById('note-dont').style.opacity = currentY > 50 ? "1" : "0";
}, {passive: true});
area.addEventListener('touchend', () => {
    isDragging = false;
    mainCard.style.transition = "0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
    if (hasMoved && currentY < -120) handleChoice('know');
    else if (hasMoved && currentY > 120) handleChoice('dont');
    else { mainCard.style.top = "0"; mainCard.style.transform = `rotateY(${mainCard.classList.contains('flipped') ? 180 : 0}deg)`; }
    document.getElementById('note-know').style.opacity = "0";
    document.getElementById('note-dont').style.opacity = "0";
});

// App Flow
function goHome() { saveProgress(); document.getElementById('app-screen').style.display = 'none'; document.getElementById('entry-page').style.display = 'flex'; }
function saveProgress() { if (activeLesson) localStorage.setItem(`lesson_v55_${activeLesson.name}`, JSON.stringify({cards, currentIndex})); }
function resetLesson() { if(confirm("Reset progress?")) { cards.forEach(c => delete c.status); currentIndex = 0; show(); } }

function loadLesson(lesson) {
    activeLesson = lesson;
    fetch(lesson.file).then(res => res.json()).then(data => {
        originalData = data.map(item => ({...item}));
        const saved = localStorage.getItem(`lesson_v55_${lesson.name}`);
        if (saved) {
            const p = JSON.parse(saved);
            cards = p.cards;
            currentIndex = p.currentIndex;
        } else {
            cards = [...originalData];
            currentIndex = 0;
        }
        document.getElementById('lessonTitle').innerText = lesson.name;
        document.getElementById('lessonContent').innerText = lesson.subTitle || "";
        document.getElementById('entry-page').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        show();
    });
}

// Initial Load
fetch('data.json').then(res => res.json()).then(data => {
    const container = document.getElementById('lesson-list-container');
    data.forEach(lesson => {
        const div = document.createElement('div');
        div.className = 'lesson-card';
        div.onclick = () => loadLesson(lesson);
        div.innerHTML = `<h3>${lesson.name}</h3><p>${lesson.subTitle || ""}</p>`;
        container.appendChild(div);
    });
});
</script>
</body>
</html>
