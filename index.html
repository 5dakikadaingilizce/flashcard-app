<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5 Dakikada İngilizce Flash Card - V.6.1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.6); 
            --primary: #38bdf8; 
            --secondary: #2dd4bf; 
            --accent: #fb7185; 
            --text-main: #f8fafc; 
            --logo-grad: linear-gradient(90deg, #ff4d4d, #f97316); 
            --white-grad: linear-gradient(180deg, #ffffff, #94a3b8);
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            min-height: 100dvh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--text-main); 
            overflow: hidden; 
            padding: 10px; 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: manipulation; 
        }

        #entry-page { display: flex; flex-direction: column; align-items: center; width: 100%; max-height: 95vh; overflow-y: auto; }
        
        .main-title-white { 
            font-family: 'Poppins'; font-size: 24px; font-weight: 900; 
            background: var(--white-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            margin-bottom: 5px; 
        }
        .select-lesson-title {
            background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 26px; margin: 5px 0 20px 0; font-weight: 900; font-family: 'Poppins';
        }

        #lesson-list-container { 
            width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 12px; max-width: 500px; padding-bottom: 40px; 
        }

        .lesson-card { 
            background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 20px 10px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.12); 
            text-align: center; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: pointer;
            display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100px;
        }
        .lesson-card:hover { border-color: #f97316; transform: translateY(-3px); }
        
        .lesson-card h3 { 
            margin: 0 0 4px 0 !important; font-family: 'Poppins' !important; font-size: 1.1rem !important; 
            font-weight: 800 !important; background: var(--logo-grad) !important; 
            -webkit-background-clip: text !important; -webkit-text-fill-color: transparent !important;
            display: block !important; width: 100% !important; line-height: 1.3 !important;
        }
        .lesson-card p { 
            margin: 0 !important; font-size: 11px !important; color: #94a3b8 !important; 
            font-weight: 500 !important; display: block !important; width: 100% !important;
            line-height: 1.4 !important; -webkit-text-fill-color: #94a3b8 !important;
        }

        #app-screen { display: none; width: 100%; max-width: 400px; flex-direction: column; }
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
        .nav-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; height: 40px; padding: 0 12px; font-size: 11px; font-weight: bold; 
            color: white; cursor: pointer; display: flex; align-items: center; gap: 5px; 
        }
        .nav-btn.active { background: var(--accent); box-shadow: 0 0 15px rgba(251, 113, 133, 0.4); border-color: white; }

        .app-box { 
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); text-align: center; position: relative;
        }

        .app-logo-small { width: 50px; margin-bottom: 5px; }
        .app-brand-text { font-size: 11px; font-weight: 700; color: white; margin-bottom: 2px; }
        
        .lesson-title-grad { 
            background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            font-weight: 900; font-size: 28px; font-family: 'Poppins'; margin: 0 0 4px 0;
            display: block !important; width: 100% !important; clear: both !important; line-height: 1.3 !important;
        }
        .lesson-content-desc { 
            color: #94a3b8 !important; -webkit-text-fill-color: #94a3b8 !important;
            font-size: 13px !important; font-weight: 500 !important; margin: 0 0 15px 0 !important; 
            display: block !important; width: 100% !important; clear: both !important; line-height: 1.4 !important;
        }

        .status-tag {
            position: absolute; top: 15px; left: 15px; padding: 4px 12px; border-radius: 50px;
            font-size: 10px; font-weight: 900; font-family: 'Poppins'; letter-spacing: 1px;
            text-transform: uppercase; z-index: 20; display: none;
        }
        .tag-learned { background: var(--secondary); color: #0f172a; display: block; border: 1px solid white; }
        .tag-unknown { background: var(--accent); color: white; display: block; border: 1px solid white; }

        .guide-container {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 10px 0; pointer-events: none; 
            z-index: 50;
            transition: opacity 0.3s;
        }
        .guide-item {
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 13px;
            animation: guide-pulse 2s infinite ease-in-out;
        }
        #guide-up { color: var(--secondary); margin-top: -5px; }
        #guide-down { color: var(--accent); margin-bottom: -5px; }
        .guide-item .material-symbols-rounded { font-size: 32px; margin: -2px 0; }

        @keyframes guide-pulse {
            0% { opacity: 0.1; transform: scale(0.95); }
            50% { opacity: 0.5; transform: scale(1.05); }
            100% { opacity: 0.1; transform: scale(0.95); }
        }

        .card-container { perspective: 1000px; width: 100%; height: 210px; margin: 10px 0; position: relative; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), top 0.3s, opacity 0.3s; z-index: 10; }
        .card.flipped { transform: rotateY(180deg); }
        .face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; align-items: center; justify-content: center; padding: 25px; 
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.15); box-sizing: border-box; 
        }
        .front { background: #1e293b; color: var(--secondary); font-size: 26px; font-weight: 800; }
        .back { background: #1e293b; color: var(--text-main); transform: rotateY(180deg); font-size: 22px; font-weight: 700; border-color: var(--primary); }

        .swipe-note { 
            position: absolute; left: 50%; transform: translateX(-50%); padding: 8px 25px; 
            border-radius: 50px; font-family: 'Poppins'; font-weight: 900; font-size: 16px; 
            opacity: 0; transition: opacity 0.2s; z-index: 60; pointer-events: none; 
        }
        #note-know { top: 40px; background: var(--secondary); color: #0f172a; border: 2px solid white; }
        #note-dont { bottom: 40px; background: var(--accent); color: white; border: 2px solid white; }

        .controls-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .control-btn { 
            flex: 1; background: rgba(51, 65, 85, 0.7); border: 1px solid rgba(255,255,255,0.05); 
            padding: 12px; border-radius: 12px; color: white; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        .btn-main { 
            background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: #0f172a; 
            width: 100%; padding: 16px; border-radius: 18px; font-size: 18px; font-weight: 900; 
            border: none; font-family: 'Poppins'; cursor: pointer; margin-bottom: 15px; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 12px rgba(56, 189, 248, 0); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); transform: scale(1); }
        }

        .stats { 
            display: flex; justify-content: space-between; background: rgba(15, 23, 42, 0.4); 
            padding: 12px 5px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); 
        }
        .stat-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .stat-label-row { display: flex; align-items: center; gap: 3px; font-size: 7px; color: #94a3b8; font-weight: 800; margin-bottom: 2px; }
        .stat-label-row .material-symbols-rounded { font-size: 12px; }
        .stat-val { font-weight: 900; font-size: 14px; color: var(--primary); }

        .v-tag { position: absolute; top: 10px; right: 10px; font-size: 10px; color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 10px; }

        #completion-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(15px); text-align: center; padding: 20px; box-sizing: border-box;
        }
        .trophy-icon { font-size: 80px; margin-bottom: 20px; animation: trophy-bounce 1s infinite alternate; }
        .congrats-title { font-family: 'Poppins'; font-size: 32px; font-weight: 900; background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .congrats-text { color: #94a3b8; font-size: 18px; margin-bottom: 30px; font-weight: 600; }

        @keyframes trophy-bounce {
            from { transform: translateY(0) scale(1); filter: drop-shadow(0 0 15px rgba(249, 115, 22, 0.5)); }
            to { transform: translateY(-15px) scale(1.1); filter: drop-shadow(0 0 35px rgba(249, 115, 22, 0.8)); }
        }

        .confetti {
            position: absolute; width: 10px; height: 10px; opacity: 0;
            animation: confetti-fall 3s ease-in infinite; pointer-events: none;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
<div class="v-tag">V.6.1 </div>

<div id="entry-page">
    <img src="logo.png" style="width: 80px; margin-bottom: 10px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3898/3898082.png'">
    <div class="main-title-white">5 Dakikada İngilizce</div>
    <div class="select-lesson-title">Flash Cards</div>
    <div id="lesson-list-container"></div>
</div>

<div id="app-screen">
    <div class="top-bar">
        <button class="nav-btn" onclick="goHome()"><span class="material-symbols-rounded">home</span> HOME</button>
        <button id="trVoiceToggle" class="nav-btn" onclick="toggleTRVoice()">
            <span class="material-symbols-rounded">volume_up</span> AUTO TR
        </button>
        <button id="shuffleToggle" class="nav-btn" onclick="toggleShuffle()"><span class="material-symbols-rounded">shuffle</span> SHUFFLE</button>
        <button class="nav-btn" onclick="resetLesson()"><span class="material-symbols-rounded">restart_alt</span> RESET</button>
    </div>
    <div class="app-box">
        <img src="logo.png" class="app-logo-small" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3898/3898082.png'">
        <div class="app-brand-text">5 Dakikada İngilizce</div>
        
        <div id="lessonTitle" class="lesson-title-grad">#Lesson</div>
        <div id="lessonContent" class="lesson-content-desc"></div>

        <div id="note-know" class="swipe-note">I KNOW ✅</div>
        <div id="note-dont" class="swipe-note">I DON'T KNOW ❌</div>

        <div class="card-container" id="swipeArea">
            <div class="guide-container" id="guideLayer">
                <div id="guide-up" class="guide-item">
                    <span class="material-symbols-rounded">keyboard_double_arrow_up</span>
                    <span>I KNOW</span>
                </div>
                <div id="guide-down" class="guide-item">
                    <span>I DON'T KNOW</span>
                    <span class="material-symbols-rounded">keyboard_double_arrow_down</span>
                </div>
            </div>

            <div class="card" id="mainCard" onclick="handleFlip(event)">
                <div class="face front">
                    <div id="tagFront" class="status-tag"></div>
                    <span id="trDisplay">...</span>
                </div>
                <div class="face back">
                    <div id="tagBack" class="status-tag"></div>
                    <span id="engDisplay">...</span>
                </div>
            </div>
        </div>

        <div class="controls-row">
            <button class="control-btn" onclick="goBack()"><span class="material-symbols-rounded">arrow_back_ios_new</span> BACK</button>
            <button class="control-btn" onclick="goNext()">NEXT <span class="material-symbols-rounded">arrow_forward_ios</span></button>
        </div>

        <button class="btn-main" onclick="speakEN()">
            <span class="material-symbols-rounded">record_voice_over</span> LISTEN EN
        </button>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label-row">ORDER <span class="material-symbols-rounded">assistant_navigation</span></div>
                <span id="orderCount" class="stat-val">0</span>
            </div>
            <div class="stat-item">
                <div class="stat-label-row">REMAIN <span class="material-symbols-rounded">layers</span></div>
                <span id="remainCount" class="stat-val">0</span>
            </div>
            <div class="stat-item">
                <div class="stat-label-row">LEARNED <span class="material-symbols-rounded" style="color:var(--secondary)">task_alt</span></div>
                <span id="correctCount" class="stat-val" style="color:var(--secondary)">0</span>
            </div>
            <div class="stat-item">
                <div class="stat-label-row">UNKNOWN <span class="material-symbols-rounded" style="color:var(--accent)">cancel</span></div>
                <span id="wrongCount" class="stat-val" style="color:var(--accent)">0</span>
            </div>
        </div>
    </div>
</div>

<div id="completion-overlay">
    <div class="trophy-icon">🏆</div>
    <div class="congrats-title">COMPLETED!</div>
    <div class="congrats-text">Tebrikler, bu dersi bitirdin!</div>
    <button class="btn-main" onclick="closeCompletion()" style="max-width: 280px; margin-top: 20px;">
        <span class="material-symbols-rounded">celebration</span> HARİKA!
    </button>
</div>

<script>
let cards = [], totalInLesson = 0, startY = 0, currentY = 0, isDragging = false, hasMoved = false;
let activeLesson = null, originalData = [], currentIndex = 0;
let autoTRVoice = localStorage.getItem('auto_tr_voice') === 'true';
let shuffleMode = false;
let audioCtx = null, pendingSound = null;

// --- UTILS ---
function fetchNoCache(url) {
    const timestamp = new Date().getTime();
    return fetch(`${url}?v=${timestamp}`);
}

function _createAudioCtx() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    return audioCtx;
}

function _playSound(type) {
    if (!audioCtx) return;
    try {
        const g = audioCtx.createGain();
        const o = audioCtx.createOscillator();
        o.connect(g); g.connect(audioCtx.destination);
        const t = audioCtx.currentTime;
        if (type === 'up') {
            o.frequency.setValueAtTime(523, t);
            o.frequency.exponentialRampToValueAtTime(1047, t + 0.12);
            g.gain.setValueAtTime(0.5, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
            o.start(t); o.stop(t + 0.18);
        } else {
            o.frequency.setValueAtTime(400, t);
            o.frequency.exponentialRampToValueAtTime(200, t + 0.18);
            g.gain.setValueAtTime(0.5, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
            o.start(t); o.stop(t + 0.22);
        }
    } catch(e) {}
}

document.addEventListener('touchstart', () => {
    _createAudioCtx();
    if (pendingSound && audioCtx) { _playSound(pendingSound); pendingSound = null; }
}, { passive: true });

function playSwipeSound(type) {
    if (audioCtx && audioCtx.state === 'running') { _playSound(type); }
    else { pendingSound = type; }
}

// --- VOICE ---
if(autoTRVoice) document.getElementById('trVoiceToggle').classList.add('active');

function toggleTRVoice() {
    autoTRVoice = !autoTRVoice;
    localStorage.setItem('auto_tr_voice', autoTRVoice);
    const btn = document.getElementById('trVoiceToggle');
    if(autoTRVoice) { btn.classList.add('active'); speakTR(); }
    else { btn.classList.remove('active'); window.speechSynthesis.cancel(); }
}

function speakTR() {
    if(!cards.length || !autoTRVoice || !cards[currentIndex]) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(cards[currentIndex].tr);
    u.lang = 'tr-TR';
    window.speechSynthesis.speak(u);
}

function speakEN() {
    if(!cards.length || !cards[currentIndex]) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(cards[currentIndex].en);
    u.lang = 'en-US';
    window.speechSynthesis.speak(u);
}

// --- CORE ---
function toggleShuffle() {
    shuffleMode = !shuffleMode;
    const btn = document.getElementById('shuffleToggle');
    if (shuffleMode) {
        btn.classList.add('active');
        cards = [...cards].sort(() => Math.random() - 0.5);
    } else {
        btn.classList.remove('active');
        const currentIds = new Set(cards.map(c => c.tr));
        cards = originalData.filter(c => currentIds.has(c.tr)).map(c => {
            const currentCard = cards.find(sc => sc.tr === c.tr);
            return currentCard ? currentCard : {...c, isLearned:false, isUnknown:false};
        });
    }
    currentIndex = 0;
    show();
}

function show() {
    if(cards.length === 0) return;
    if(currentIndex >= cards.length) currentIndex = 0;
    if(currentIndex < 0) currentIndex = cards.length - 1;

    mainCard.classList.remove('flipped');
    mainCard.style.cssText = "top: 0; opacity: 1; transform: rotateY(0deg);";
    
    document.getElementById('trDisplay').innerText = cards[currentIndex].tr;
    document.getElementById('engDisplay').innerText = cards[currentIndex].en;
    
    // Tag System
    const tagF = document.getElementById('tagFront');
    const tagB = document.getElementById('tagBack');
    tagF.className = "status-tag"; tagB.className = "status-tag";
    tagF.style.display = tagB.style.display = "none";

    if(cards[currentIndex].isLearned) {
        tagF.innerText = tagB.innerText = "LEARNED ✅";
        tagF.classList.add("tag-learned"); tagB.classList.add("tag-learned");
        tagF.style.display = tagB.style.display = "block";
    } else if(cards[currentIndex].isUnknown) {
        tagF.innerText = tagB.innerText = "UNKNOWN ❌";
        tagF.classList.add("tag-unknown"); tagB.classList.add("tag-unknown");
        tagF.style.display = tagB.style.display = "block";
    }

    // Stats
    const learnedCount = cards.filter(c => c.isLearned).length;
    const unknownCount = cards.filter(c => c.isUnknown).length;
    
    document.getElementById('remainCount').innerText = cards.length;
    document.getElementById('correctCount').innerText = learnedCount;
    document.getElementById('wrongCount').innerText = unknownCount;
    document.getElementById('orderCount').innerText = (currentIndex + 1) + '/' + cards.length;
    
    if(autoTRVoice) { setTimeout(speakTR, 300); }
    document.getElementById('guideLayer').style.opacity = "1";
}

function handleFlip(event) {
    if (hasMoved) return;
    mainCard.classList.toggle('flipped');
    let rotY = mainCard.classList.contains('flipped') ? 180 : 0;
    mainCard.style.transform = `rotateY(${rotY}deg)`;
}

// --- SWIPE LOGIC ---
const area = document.getElementById('swipeArea');
const mainCard = document.getElementById('mainCard');

const startAction = (y) => { 
    _createAudioCtx(); 
    startY = y; isDragging = true; hasMoved = false; 
    mainCard.style.transition = "none"; 
};

const moveAction = (y) => {
    if (!isDragging) return;
    currentY = y - startY;
    if (Math.abs(currentY) > 10) {
        hasMoved = true;
        document.getElementById('guideLayer').style.opacity = "0";
    }
    let rotY = mainCard.classList.contains('flipped') ? 180 : 0;
    mainCard.style.top = currentY + "px";
    mainCard.style.transform = `rotateY(${rotY}deg) rotateX(${-currentY/20}deg)`;
    if(currentY < -50) document.getElementById('note-know').style.opacity = "1";
    else if(currentY > 50) document.getElementById('note-dont').style.opacity = "1";
    else { 
        document.getElementById('note-know').style.opacity = "0"; 
        document.getElementById('note-dont').style.opacity = "0"; 
    }
};

const endAction = () => {
    if (!isDragging) return;
    isDragging = false;
    if (hasMoved) {
        mainCard.style.transition = "0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
        if(currentY < -120) handleChoice(true);
        else if(currentY > 120) handleChoice(false);
        else { resetCard(); document.getElementById('guideLayer').style.opacity = "1"; }
    } else { document.getElementById('guideLayer').style.opacity = "1"; }
    document.getElementById('note-know').style.opacity = "0";
    document.getElementById('note-dont').style.opacity = "0";
    currentY = 0;
};

area.addEventListener('touchstart', (e) => startAction(e.touches[0].clientY), {passive: true});
area.addEventListener('touchmove', (e) => moveAction(e.touches[0].clientY), {passive: true});
area.addEventListener('touchend', endAction);
area.onmousedown = (e) => startAction(e.clientY);
window.onmousemove = (e) => moveAction(e.clientY);
window.onmouseup = endAction;

function handleChoice(isCorrect) {
    if(isCorrect) { 
        playSwipeSound('up');
        cards[currentIndex].isLearned = true;
        cards[currentIndex].isUnknown = false;
        mainCard.style.top = "-1000px"; mainCard.style.opacity = "0"; 
        
        setTimeout(() => { 
            const learnedCount = cards.filter(c => c.isLearned).length;
            // BİTİŞ ŞARTI: Tüm sorular öğrenildiğinde
            if(learnedCount === cards.length) {
                showCompletion();
            } else {
                // Öğrenilmeyeni bulana kadar dön
                let nextIdx = (currentIndex + 1) % cards.length;
                while(cards[nextIdx].isLearned) {
                    nextIdx = (nextIdx + 1) % cards.length;
                }
                currentIndex = nextIdx;
                saveProgress(); show(); 
            }
        }, 200); 
    }
    else { 
        playSwipeSound('down');
        cards[currentIndex].isUnknown = true;
        cards[currentIndex].isLearned = false;
        mainCard.style.top = "1000px"; mainCard.style.opacity = "0"; 
        setTimeout(() => { 
            currentIndex = (currentIndex + 1) % cards.length;
            saveProgress(); show(); 
        }, 200); 
    }
}

function resetCard() { 
    let rotY = mainCard.classList.contains('flipped') ? 180 : 0; 
    mainCard.style.top = "0"; mainCard.style.transform = `rotateY(${rotY}deg)`; 
}

function goNext() { currentIndex = (currentIndex + 1) % cards.length; show(); }
function goBack() { currentIndex = (currentIndex - 1 + cards.length) % cards.length; show(); }

function goHome() { 
    saveProgress(); 
    document.getElementById('app-screen').style.display = 'none'; 
    document.getElementById('entry-page').style.display = 'flex'; 
}

function saveProgress() { 
    if (activeLesson && cards.length > 0) {
        localStorage.setItem(`lesson_progress_${activeLesson.name}`, JSON.stringify({cards, currentIndex})); 
    }
}

function resetLesson() { 
    if(confirm("Reset?")) { 
        localStorage.removeItem(`lesson_progress_${activeLesson.name}`); 
        loadLesson(activeLesson); 
    } 
}

function loadLesson(lesson) {
    _createAudioCtx(); 
    activeLesson = lesson;
    shuffleMode = false;
    
    // Cache Busting Fetch
    fetchNoCache(lesson.file).then(res => res.json()).then(data => {
        originalData = data;
        const saved = localStorage.getItem(`lesson_progress_${lesson.name}`);
        
        if (saved) { 
            const p = JSON.parse(saved); 
            // Senkronizasyon Kontrolü: Soru sayısı değiştiyse sıfırla
            if(p.cards.length !== data.length) {
                cards = data.map(item => ({...item, isLearned: false, isUnknown: false})); 
                currentIndex = 0;
            } else {
                cards = p.cards; currentIndex = p.currentIndex || 0;
            }
        }
        else { 
            cards = data.map(item => ({...item, isLearned: false, isUnknown: false})); 
            currentIndex = 0; 
        }
        
        document.getElementById('lessonTitle').innerText = lesson.name;
        document.getElementById('lessonContent').innerText = lesson.subTitle || "";
        document.getElementById('entry-page').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        document.getElementById('shuffleToggle').classList.remove('active');
        show();
    });
}

function showCompletion() {
    document.getElementById('completion-overlay').style.display = 'flex';
    createConfetti();
}

function closeCompletion() {
    document.getElementById('completion-overlay').style.display = 'none';
    goHome();
}

function createConfetti() {
    const colors = ['#38bdf8', '#2dd4bf', '#fb7185', '#f97316', '#ffffff'];
    const overlay = document.getElementById('completion-overlay');
    for (let i = 0; i < 60; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 2 + 's';
        confetti.style.width = Math.random() * 8 + 5 + 'px';
        confetti.style.height = confetti.style.width;
        overlay.appendChild(confetti);
        setTimeout(() => confetti.remove(), 4000);
    }
}

// Init Lesson List with Cache Busting
fetchNoCache('data.json').then(res => res.json()).then(data => {
    const container = document.getElementById('lesson-list-container');
    data.forEach(lesson => {
        const div = document.createElement('div');
        div.className = 'lesson-card';
        div.onclick = () => loadLesson(lesson);
        div.innerHTML = `<h3>${lesson.name}</h3><p>${lesson.subTitle || ""}</p>`;
        container.appendChild(div);
    });
});
</script>
</body>
</html>
