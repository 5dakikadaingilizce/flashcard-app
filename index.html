<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5 Dakikada İngilizce Flash Card - V.6.3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root { 
            --bg-dark: #0f172a; --card-bg: rgba(30, 41, 59, 0.6); --primary: #38bdf8; 
            --secondary: #2dd4bf; --accent: #fb7185; --text-main: #f8fafc; 
            --logo-grad: linear-gradient(90deg, #ff4d4d, #f97316); 
            --white-grad: linear-gradient(180deg, #ffffff, #94a3b8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); 
            min-height: 100vh; overflow-x: hidden; -webkit-user-select: none; user-select: none;
        }

        /* YENİ: LOGO ANİMASYONLARI (ARKA PLAN) */
        .bg-decor { position: fixed; width: 120px; height: 120px; opacity: 0.15; z-index: -1; pointer-events: none; animation: floatLogo 8s ease-in-out infinite; }
        .bg-decor.left { left: -20px; top: 25%; transform: rotate(-15deg); }
        .bg-decor.right { right: -20px; top: 65%; transform: rotate(15deg); animation-delay: 2s; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0) rotate(-15deg); } 50% { transform: translateY(-30px) rotate(-5deg); } }

        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; padding: 20px; position: relative; }
        
        /* HEADER */
        header { text-align: center; margin-bottom: 25px; padding-top: 10px; }
        .logo { font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 2.2rem; background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); letter-spacing: -1px; cursor: pointer; }

        /* MODÜL SEÇİM EKRANI (REVİZE: SADECE LOGO) */
        #module-screen { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .module-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 100%; padding: 20px; }
        .module-btn { 
            display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s;
        }
        .module-btn img { width: 130px; height: 130px; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4)); }
        .module-btn span { font-weight: 800; font-size: 1rem; color: var(--text-main); text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .module-btn:active { transform: scale(0.9); }

        /* DERS YOLU (DUOLINGO STİLİ ZİKZAK) */
        #path-screen { flex-grow: 1; display: none; }
        .lesson-path { display: flex; flex-direction: column; align-items: center; gap: 50px; padding: 40px 0 120px 0; position: relative; }
        .lesson-node { position: relative; width: 90px; height: 90px; cursor: pointer; z-index: 10; }
        .lesson-circle { 
            width: 100%; height: 100%; border-radius: 50%; background: #1e293b; border: 5px solid #334155;
            display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; color: #475569;
            box-shadow: 0 8px 0 #0f172a; transition: 0.2s;
        }
        .lesson-node.active .lesson-circle { border-color: var(--primary); color: var(--primary); box-shadow: 0 8px 0 #0369a1; background: #1e293b; }
        .lesson-node.completed .lesson-circle { background: var(--primary); color: white; border-color: #0ea5e9; box-shadow: 0 8px 0 #075985; }
        
        /* Zikzak Dizilim Mantığı */
        .lesson-node:nth-child(4n+2) { transform: translateX(70px); }
        .lesson-node:nth-child(4n+4) { transform: translateX(-70px); }

        /* LESSON POPOVER (DERS KUTUCUĞU) */
        .lesson-popover {
            position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%) scale(0.9);
            width: 180px; background: #1e293b; border: 3px solid var(--primary); border-radius: 20px;
            padding: 15px; display: none; flex-direction: column; align-items: center; gap: 10px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6); z-index: 100; opacity: 0; transition: 0.3s;
        }
        .lesson-popover.show { display: flex; opacity: 1; transform: translateX(-50%) scale(1); }
        .lesson-popover::after {
            content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 12px solid var(--primary);
        }
        .popover-title { font-weight: 800; font-size: 0.9rem; text-align: center; color: white; }
        .btn-start-lesson { 
            background: var(--primary); color: white; border: none; padding: 8px 20px; 
            border-radius: 15px; font-weight: 900; font-size: 0.8rem; cursor: pointer; width: 100%;
            box-shadow: 0 4px 0 #0369a1;
        }
        .btn-start-lesson:active { transform: translateY(2px); box-shadow: 0 2px 0 #0369a1; }

        /* FLASHCARD EKRANI */
        #flashcard-screen { display: none; flex-grow: 1; flex-direction: column; }
        .card-container { perspective: 1000px; height: 380px; margin: 20px 0; position: relative; }
        .card { 
            position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; 
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 35px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
            background: var(--card-bg); border: 2px solid var(--glass-border); backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .card-back { transform: rotateY(180deg); background: linear-gradient(145deg, rgba(30,41,59,0.9), rgba(15,23,42,0.95)); }
        
        /* PROGRESS BAR */
        .progress-container { height: 12px; background: #334155; border-radius: 10px; margin: 10px 0 30px 0; overflow: hidden; border: 2px solid #1e293b; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 0.4s ease; }

        /* TEBRİKLER EKRANI (REVİZE: BUTON BOYUTU) */
        #completion-overlay { 
            position: fixed; inset: 0; background: rgba(15,23,42,0.98); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; padding: 40px;
        }
        .stars-row { display: flex; gap: 15px; margin: 30px 0; }
        .comp-star { font-size: 50px; color: #334155; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .comp-star.filled { color: #fbbf24; transform: scale(1.2) rotate(15deg); filter: drop-shadow(0 0 15px rgba(251,191,36,0.5)); }
        .btn-done { 
            background: var(--primary); color: white; border: none; padding: 14px 40px; 
            border-radius: 30px; font-weight: 800; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 6px 0 #0369a1; transition: 0.2s;
        }
        .btn-done:active { transform: translateY(3px); box-shadow: 0 3px 0 #0369a1; }

        /* DİĞER BUTONLAR */
        .nav-btn { background: #1e293b; border: 2px solid #334155; color: white; padding: 15px; border-radius: 20px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .nav-btn:active { transform: scale(0.95); }
        .nav-btn.primary { background: var(--primary); border-color: #0ea5e9; }

        .hidden { display: none !important; }
        .confetti { position: absolute; width: 10px; height: 10px; border-radius: 2px; pointer-events: none; z-index: 1001; }
    </style>
</head>
<body>

    <img src="logo.png" class="bg-decor left" alt="decor">
    <img src="logo.png" class="bg-decor right" alt="decor">

    <div class="container">
        <header>
            <div class="logo" onclick="goHome()">5DK İNGİLİZCE</div>
        </header>

        <div id="module-screen">
            <div class="module-grid">
                <div class="module-btn" onclick="selectModule('module3')">
                    <img src="logo.png" alt="M3">
                    <span>Modül 3</span>
                </div>
                <div class="module-btn" onclick="selectModule('module4')">
                    <img src="logo.png" alt="M4">
                    <span>Modül 4</span>
                </div>
            </div>
        </div>

        <div id="path-screen">
            <div class="lesson-path" id="lessonPathContainer"></div>
        </div>

        <div id="flashcard-screen">
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div id="cardCounter" style="text-align:right; font-weight:800; color:var(--primary); font-size:0.9rem; margin-bottom:5px;">1 / 10</div>
            
            <div class="card-container">
                <div class="card" id="mainCard" onclick="this.classList.toggle('flipped')">
                    <div class="card-face card-front">
                        <span class="material-symbols-rounded" style="position:absolute; top:25px; right:25px; color:#475569">info</span>
                        <div id="wordText" style="font-size: 2.8rem; font-weight: 900; margin-bottom: 15px; text-align:center;">Word</div>
                        <div id="wordPron" style="color: var(--secondary); font-weight: 700; font-size: 1.2rem; background: rgba(45,212,191,0.1); padding: 5px 15px; border-radius: 10px;">/pron/</div>
                    </div>
                    <div class="card-face card-back">
                        <div id="wordMeaning" style="font-size: 2.2rem; font-weight: 900; color: var(--accent); margin-bottom: 20px; text-align:center;">Anlamı</div>
                        <div id="wordExample" style="font-style: italic; text-align: center; color: #cbd5e1; line-height: 1.5; font-size: 1.1rem; padding: 0 10px;">"Example sentence"</div>
                    </div>
                </div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 2fr; gap: 15px; margin-top: auto; padding-bottom: 20px;">
                <button class="nav-btn" onclick="prevCard()">
                    <span class="material-symbols-rounded">arrow_back_ios_new</span>
                </button>
                <button class="nav-btn primary" onclick="nextCard()" style="justify-content: center;">
                    İLERİ <span class="material-symbols-rounded">arrow_forward_ios</span>
                </button>
            </div>
        </div>
    </div>

    <div id="completion-overlay">
        <div style="font-size: 80px; margin-bottom: 10px;">🎉</div>
        <h1 style="font-family: 'Poppins'; font-weight: 900; font-size: 2.5rem; margin: 0; background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">MÜKEMMEL!</h1>
        <p id="completionHint" style="color: var(--secondary); font-weight: 800; font-size: 1.2rem; margin-top: 10px;"></p>
        
        <div class="stars-row">
            <span class="material-symbols-rounded comp-star" id="star1">star</span>
            <span class="material-symbols-rounded comp-star" id="star2">star</span>
            <span class="material-symbols-rounded comp-star" id="star3">star</span>
        </div>

        <button class="btn-done" onclick="closeCompletion()">DEVAM ET</button>
    </div>

    <script>
        let allModulesData = {};
        let currentModule = '';
        let currentLessonIndex = 0;
        let currentCardIndex = 0;
        let activeLessons = [];

        function fetchNoCache(url) {
            return fetch(url + '?v=' + Date.now()).then(res => res.json());
        }

        // INIT
        fetchNoCache('data.json').then(data => {
            allModulesData = data;
            // Başlangıçta modül ekranı aktif
        }).catch(err => console.error("Veri yüklenemedi:", err));

        function selectModule(mKey) {
            currentModule = mKey;
            activeLessons = allModulesData[mKey] || [];
            document.getElementById('module-screen').classList.add('hidden');
            document.getElementById('path-screen').style.display = 'block';
            renderPath();
        }

        function renderPath() {
            const container = document.getElementById('lessonPathContainer');
            container.innerHTML = '';
            
            activeLessons.forEach((lesson, index) => {
                const node = document.createElement('div');
                node.className = 'lesson-node active'; // Hepsi aktif (senin v6.2 mantığın)
                node.innerHTML = `
                    <div class="lesson-circle">${index + 1}</div>
                    <div class="lesson-popover" id="popover-${index}">
                        <div class="popover-title">${lesson.lessonName}</div>
                        <button class="btn-start-lesson" onclick="startLesson(${index})">BAŞLAT</button>
                    </div>
                `;
                
                node.onclick = (e) => {
                    e.stopPropagation();
                    showPopover(index);
                };
                
                container.appendChild(node);
            });
        }

        function showPopover(index) {
            // Diğerlerini kapat
            document.querySelectorAll('.lesson-popover').forEach(p => p.classList.remove('show'));
            // Seçileni aç
            const pop = document.getElementById(`popover-${index}`);
            pop.classList.add('show');
        }

        // Boşluğa tıklayınca popover kapat
        document.addEventListener('click', () => {
            document.querySelectorAll('.lesson-popover').forEach(p => p.classList.remove('show'));
        });

        function startLesson(idx) {
            currentLessonIndex = idx;
            currentCardIndex = 0;
            document.getElementById('path-screen').style.display = 'none';
            document.getElementById('flashcard-screen').style.display = 'flex';
            updateCard();
        }

        function updateCard() {
            const lesson = activeLessons[currentLessonIndex];
            const card = lesson.cards[currentCardIndex];
            const total = lesson.cards.length;

            document.getElementById('mainCard').classList.remove('flipped');
            document.getElementById('cardCounter').innerText = `${currentCardIndex + 1} / ${total}`;
            document.getElementById('progressBar').style.width = `${((currentCardIndex + 1) / total) * 100}%`;
            
            document.getElementById('wordText').innerText = card.word;
            document.getElementById('wordPron').innerText = card.pron;
            document.getElementById('wordMeaning').innerText = card.meaning;
            document.getElementById('wordExample').innerText = `"${card.example}"`;
        }

        function nextCard() {
            const lesson = activeLessons[currentLessonIndex];
            if(currentCardIndex < lesson.cards.length - 1) {
                currentCardIndex++;
                updateCard();
            } else {
                showCompletion();
            }
        }

        function prevCard() {
            if(currentCardIndex > 0) {
                currentCardIndex--;
                updateCard();
            }
        }

        function showCompletion() {
            const count = 3; 
            const stars = [document.getElementById('star1'), document.getElementById('star2'), document.getElementById('star3')];
            
            stars.forEach(s => s.classList.remove('filled'));
            
            document.getElementById('completionHint').innerText = 'Bu dersi başarıyla tamamladın!';
            document.getElementById('completion-overlay').style.display = 'flex';

            stars.forEach((star, i) => {
                setTimeout(() => {
                    star.classList.add('filled');
                }, 400 + (i * 400));
            });

            createConfetti();
        }

        function closeCompletion() {
            document.getElementById('completion-overlay').style.display = 'none';
            document.getElementById('flashcard-screen').style.display = 'none';
            document.getElementById('path-screen').style.display = 'block';
        }

        function goHome() {
            location.reload();
        }

        function createConfetti() {
            const colors = ['#38bdf8', '#2dd4bf', '#fb7185', '#fbbf24', '#ffffff'];
            const container = document.getElementById('completion-overlay');
            for(let i=0; i<60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-10px';
                c.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                container.appendChild(c);
                
                const duration = Math.random() * 3 + 2;
                c.animate([
                    { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                    { transform: `translateY(100vh) rotate(${Math.random()*360}deg)`, opacity: 0 }
                ], { duration: duration * 1000, easing: 'ease-out' });
                
                setTimeout(() => c.remove(), duration * 1000);
            }
        }
    </script>
</body>
</html>
