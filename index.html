<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5 Dakikada İngilizce - V.4.4 Counter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root { --bg-dark: #0f172a; --card-bg: rgba(30, 41, 59, 0.6); --primary: #38bdf8; --secondary: #2dd4bf; --accent: #fb7185; --text-main: #f8fafc; --logo-grad: linear-gradient(90deg, #ff4d4d, #f97316); }
        body { margin: 0; font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); min-height: 100dvh; display: flex; justify-content: center; align-items: center; color: var(--text-main); overflow: hidden; padding: 10px; box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }
        
        #entry-page { display: flex; flex-direction: column; align-items: center; width: 100%; max-height: 95vh; overflow-y: auto; }
        .logo-container { margin-bottom: 15px; text-align: center; }
        .main-logo { width: 70px; height: 70px; margin-bottom: 10px; }
        .main-title-brand { font-family: 'Poppins'; font-size: 26px; font-weight: 900; background: linear-gradient(180deg, #ffffff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .flash-card-subtitle { font-family: 'Poppins'; font-size: 14px; font-weight: 700; color: var(--primary); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; opacity: 0.8; }
        
        #lesson-list-container { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 500px; padding-bottom: 40px; }
        .lesson-card { background: var(--card-bg); backdrop-filter: blur(15px); padding: 20px 10px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.12); text-align: center; cursor: pointer; min-height: 100px; display: flex; align-items: center; justify-content: center; }

        #app-screen { display: none; width: 100%; max-width: 400px; flex-direction: column; align-items: center; }
        .nav-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 12px; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 15px; color: white; cursor: pointer; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 4px; font-family: 'Poppins'; }
        .header-logo { width: 45px; height: 45px; object-fit: contain; }

        .app-box { width: 100%; background: var(--card-bg); backdrop-filter: blur(20px); padding: 20px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); text-align: center; position: relative; overflow: hidden; box-sizing: border-box; }
        
        /* SIRA SAYACI STİLİ */
        .card-counter { font-family: 'Poppins'; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 5px; letter-spacing: 1px; }

        .card-container { perspective: 1000px; width: 100%; height: 260px; margin: 10px 0; position: relative; z-index: 2; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), top 0.3s, opacity 0.3s; pointer-events: auto; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.15); box-sizing: border-box; pointer-events: none; }
        .front { background: #1e293b; color: var(--secondary); font-size: 24px; font-weight: 800; }
        .back { background: rgba(30, 41, 59, 1); color: var(--text-main); transform: rotateY(180deg); font-size: 20px; font-weight: 700; border-color: var(--primary); }

        .swipe-note { position: absolute; left: 50%; transform: translateX(-50%); padding: 10px 30px; border-radius: 50px; font-family: 'Poppins'; font-weight: 900; font-size: 18px; opacity: 0; transition: opacity 0.2s; z-index: 10; pointer-events: none; }
        #note-know { top: 40px; background: var(--secondary); color: #0f172a; border: 3px solid white; }
        #note-dont { bottom: 40px; background: var(--accent); color: white; border: 3px solid white; }

        .controls-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .control-btn { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-main { background: var(--primary); color: #0f172a; width: 100%; padding: 16px; border-radius: 18px; font-size: 18px; font-weight: 900; border: none; font-family: 'Poppins'; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .stats { display: flex; justify-content: space-between; background: rgba(15, 23, 42, 0.6); padding: 15px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .stat-label { font-size: 8px; color: #94a3b8; font-weight: 800; text-transform: uppercase; }
        .stat-val { font-weight: 900; font-size: 16px; }
    </style>
</head>
<body>

<div id="entry-page">
    <div class="logo-container">
        <img src="logo.png" class="main-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3898/3898082.png'">
        <div class="main-title-brand">5 Dakikada İngilizce</div>
        <div class="flash-card-subtitle">Flash Card</div>
    </div>
    <div id="lesson-list-container"></div>
</div>

<div id="app-screen">
    <div class="nav-row">
        <button class="nav-btn" onclick="goHome()"><span class="material-symbols-rounded">home</span> HOME</button>
        <img src="logo.png" class="header-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3898/3898082.png'">
        <button class="nav-btn" onclick="resetLesson()"><span class="material-symbols-rounded">restart_alt</span> RESET</button>
    </div>
    <div class="app-box">
        <div id="note-know" class="swipe-note">I KNOW ✅</div>
        <div id="note-dont" class="swipe-note">I DON'T KNOW ❌</div>
        
        <div id="lessonTitle" style="color:var(--primary); font-weight:900; margin-bottom:2px;">#Lesson</div>
        
        <div class="card-counter" id="cardCounter">0 / 0</div>

        <div class="card-container" id="swipeArea">
            <div class="card" id="mainCard" onclick="handleFlip(event)">
                <div class="face front" id="trDisplay">...</div>
                <div class="face back" id="engDisplay">...</div>
            </div>
        </div>
        <div class="controls-row">
            <button class="control-btn" onclick="goBack()"><span class="material-symbols-rounded">arrow_back_ios_new</span></button>
            <button class="control-btn" onclick="goNext()"><span class="material-symbols-rounded">arrow_forward_ios</span></button>
        </div>
        <button class="btn-main" onclick="speak()"><span class="material-symbols-rounded">volume_up</span> LISTEN</button>
        <div class="stats">
            <div class="stat-item"><span id="wrongCount" class="stat-val" style="color:var(--accent)">0</span><span class="stat-label">UNKNOWN</span></div>
            <div class="stat-item"><span id="remainCount" class="stat-val" style="color:var(--primary)">0</span><span class="stat-label">REMAIN</span></div>
            <div class="stat-item"><span id="correctCount" class="stat-val" style="color:var(--secondary)">0</span><span class="stat-label">LEARNED</span></div>
        </div>
    </div>
</div>

<script>
let cards = [], totalInLesson = 0, learned = 0, wrong = 0, startY = 0, currentY = 0, isDragging = false, hasMoved = false;
let activeLesson = null;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playFeedback(freq, type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function handleFlip(e) {
    if (hasMoved) return;
    const card = document.getElementById('mainCard');
    card.classList.toggle('flipped');
    let rotY = card.classList.contains('flipped') ? 180 : 0;
    card.style.transform = `rotateY(${rotY}deg)`;
}

const area = document.getElementById('swipeArea');
const mainCard = document.getElementById('mainCard');

const startAction = (y) => { 
    startY = y; 
    isDragging = true; 
    hasMoved = false;
    mainCard.style.transition = "none"; 
};

const moveAction = (y) => {
    if (!isDragging) return;
    currentY = y - startY;
    if (Math.abs(currentY) > 10) hasMoved = true;
    
    let rotY = mainCard.classList.contains('flipped') ? 180 : 0;
    mainCard.style.top = currentY + "px";
    mainCard.style.transform = `rotateY(${rotY}deg) rotateX(${-currentY/20}deg)`;
    
    if(currentY < -50) document.getElementById('note-know').style.opacity = "1";
    else if(currentY > 50) document.getElementById('note-dont').style.opacity = "1";
    else { document.getElementById('note-know').style.opacity = "0"; document.getElementById('note-dont').style.opacity = "0"; }
};

const endAction = () => {
    if (!isDragging) return;
    isDragging = false;
    if (hasMoved) {
        mainCard.style.transition = "0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
        if(currentY < -120) handleChoice(true);
        else if(currentY > 120) handleChoice(false);
        else resetCard();
    }
    document.getElementById('note-know').style.opacity = "0";
    document.getElementById('note-dont').style.opacity = "0";
    currentY = 0;
};

area.addEventListener('touchstart', (e) => startAction(e.touches[0].clientY), {passive: true});
area.addEventListener('touchmove', (e) => moveAction(e.touches[0].clientY), {passive: true});
area.addEventListener('touchend', endAction);
area.addEventListener('mousedown', (e) => startAction(e.clientY));
window.addEventListener('mousemove', (e) => moveAction(e.clientY));
window.addEventListener('mouseup', endAction);

function loadLesson(lesson) {
    activeLesson = lesson;
    fetch(lesson.file).then(res => res.json()).then(data => {
        totalInLesson = data.length; // Toplam kelime sayısını al
        const saved = localStorage.getItem(`lesson_progress_${lesson.name}`);
        if (saved) { const p = JSON.parse(saved); cards = p.cards; learned = p.learned; wrong = p.wrong; }
        else { cards = [...data]; learned = 0; wrong = 0; }
        document.getElementById('lessonTitle').innerText = lesson.name;
        document.getElementById('entry-page').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        show();
    });
}

function show() {
    if(cards.length === 0) { alert("Lesson completed!"); localStorage.removeItem(`lesson_progress_${activeLesson.name}`); goHome(); return; }
    mainCard.classList.remove('flipped');
    mainCard.style.cssText = "top: 0; opacity: 1; transform: rotateY(0deg);";
    document.getElementById('trDisplay').innerText = cards[0].tr;
    document.getElementById('engDisplay').innerText = cards[0].en;
    
    // İstatistikler
    document.getElementById('remainCount').innerText = cards.length;
    document.getElementById('correctCount').innerText = learned;
    document.getElementById('wrongCount').innerText = wrong;

    // SAYAÇ GÜNCELLEME (Kaçıncıdayız / Toplam)
    // Öğrenilen + Yanlış + Mevcut Mantığına Göre:
    let currentPos = totalInLesson - cards.length + 1;
    document.getElementById('cardCounter').innerText = `${currentPos} / ${totalInLesson}`;
}

function handleChoice(isCorrect) {
    if(isCorrect) { playFeedback(800); mainCard.style.top = "-1000px"; mainCard.style.opacity = "0"; setTimeout(() => { learned++; cards.shift(); saveProgress(); show(); }, 200); }
    else { playFeedback(300); mainCard.style.top = "1000px"; mainCard.style.opacity = "0"; setTimeout(() => { wrong++; cards.push(cards.shift()); saveProgress(); show(); }, 200); }
}

function resetCard() { let rotY = mainCard.classList.contains('flipped') ? 180 : 0; mainCard.style.top = "0"; mainCard.style.transform = `rotateY(${rotY}deg)`; }
function goNext() { if(cards.length < 2) return; cards.push(cards.shift()); show(); }
function goBack() { if(cards.length < 2) return; cards.unshift(cards.pop()); show(); }
function speak() { if(!cards.length) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(cards[0].en); u.lang = 'en-US'; window.speechSynthesis.speak(u); }
function goHome() { saveProgress(); document.getElementById('app-screen').style.display = 'none'; document.getElementById('entry-page').style.display = 'flex'; }
function saveProgress() { if (activeLesson && cards.length > 0) localStorage.setItem(`lesson_progress_${activeLesson.name}`, JSON.stringify({cards, learned, wrong})); }
function resetLesson() { if(confirm("Reset?")) { localStorage.removeItem(`lesson_progress_${activeLesson.name}`); loadLesson(activeLesson); } }

fetch('data.json').then(res => res.json()).then(data => {
    const container = document.getElementById('lesson-list-container');
    data.forEach(lesson => {
        const div = document.createElement('div');
        div.className = 'lesson-card';
        div.onclick = () => loadLesson(lesson);
        div.innerHTML = `<h3>${lesson.name}</h3>`;
        container.appendChild(div);
    });
});
</script>
</body>
</html>
